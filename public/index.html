<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MedBridge Connect — EMR/EHR Middleware Integration Engine. Channel-based healthcare message routing with HL7 and FHIR support.">
  <title>MedBridge Connect — Healthcare Integration Engine</title>
  <link rel="stylesheet" href="/css/index.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="sidebar-brand-icon">🏥</div>
        <div>
          <h1>MedBridge</h1>
          <span>Integration Engine</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Overview</div>
        <div class="nav-item active" data-page="dashboard" id="nav-dashboard">
          <span class="nav-item-icon">📊</span>
          <span>Dashboard</span>
        </div>

        <div class="sidebar-section-label">Integration</div>
        <div class="nav-item" data-page="channels" id="nav-channels">
          <span class="nav-item-icon">🔀</span>
          <span>Channels</span>
        </div>
        <div class="nav-item" data-page="messages" id="nav-messages">
          <span class="nav-item-icon">📨</span>
          <span>Messages</span>
        </div>

        <div class="sidebar-section-label">AI Operations</div>
        <div class="nav-item" data-page="ai-ops" id="nav-ai-ops">
          <span class="nav-item-icon">🤖</span>
          <span>AI Ops Console</span>
        </div>

        <div class="sidebar-section-label">System</div>
        <div class="nav-item" data-page="alerts" id="nav-alerts">
          <span class="nav-item-icon">🔔</span>
          <span>Alerts</span>
        </div>
        <div class="nav-item" data-page="settings" id="nav-settings">
          <span class="nav-item-icon">⚙️</span>
          <span>Settings</span>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-status">
          <span class="status-dot"></span>
          <span>Engine Running</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="main-header">
        <h2 class="header-title" id="page-title">Dashboard</h2>
        <div class="header-actions" id="header-actions"></div>
      </header>

      <div class="page-content" id="page-content">
        <!-- Pages injected here by SPA router -->
      </div>
    </main>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modal-title">Modal</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- App Scripts -->
  <script src="/js/app.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/channels.js"></script>
  <script src="/js/pages/messages.js"></script>
  <script src="/js/pages/alerts.js"></script>
  <script src="/js/pages/settings.js"></script>
  <script src="/js/pages/ai-ops.js"></script>
</body>
</html>
