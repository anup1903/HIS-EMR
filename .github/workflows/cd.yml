name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/aegisforge:$IMAGE_TAG .
          docker push $ECR_REGISTRY/aegisforge:$IMAGE_TAG

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - run: |
          aws eks update-kubeconfig --name aegisforge-staging
          kubectl set image deployment/aegisforge \
            aegisforge=${{ secrets.ECR_REGISTRY }}/aegisforge:${{ github.sha }} \
            --namespace aegisforge
          kubectl rollout status deployment/aegisforge --namespace aegisforge --timeout=300s

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval in GitHub
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - run: |
          aws eks update-kubeconfig --name aegisforge-production
          # Canary: 5% traffic via Argo Rollouts
          kubectl argo rollouts set image aegisforge \
            aegisforge=${{ secrets.ECR_REGISTRY }}/aegisforge:${{ github.sha }} \
            --namespace aegisforge
          kubectl argo rollouts status aegisforge --namespace aegisforge --timeout=900s
