services:
  # PostgreSQL Database - Port 9002
  db:
    image: postgres:16-alpine
    container_name: his-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: his_system
    ports:
      - "9004:5432"
    volumes:
      - his_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Next.js HIS Application - Port 9000
  app:
    container_name: his-app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "9003:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/his_system?schema=public"
      NEXTAUTH_SECRET: "his-system-docker-secret-key-change-in-production-min-32"
      NEXTAUTH_URL: "http://localhost:9003"
    depends_on:
      db:
        condition: service_healthy

  # Database migrations & seed runner
  migrate:
    container_name: his-migrate
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/his_system?schema=public"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  his_pgdata:
