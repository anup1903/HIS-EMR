services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      AEGIS_DATABASE_URL: "postgresql+asyncpg://aegis:localdev@postgres:5432/aegisforge"
      AEGIS_REDIS_URL: "redis://redis:6379/0"
      AEGIS_ENV: "development"
      AEGIS_LOG_LEVEL: "DEBUG"
      AEGIS_DEMO_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A aegisforge.executor.worker worker --loglevel=info --concurrency=4
    environment:
      AEGIS_DATABASE_URL: "postgresql+asyncpg://aegis:localdev@postgres:5432/aegisforge"
      AEGIS_REDIS_URL: "redis://redis:6379/0"
      AEGIS_ENV: "development"
    healthcheck:
      test: ["CMD-SHELL", "celery -A aegisforge.executor.worker inspect ping --timeout=1 -d celery@$$HOSTNAME >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: aegisforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegisforge"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      app:
        condition: service_started

volumes:
  pgdata:
