services:
  # ============================================================
  # Infrastructure Services
  # ============================================================

  # PostgreSQL with pgvector (shared by HIS-EMR and AegisForge)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: his-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aegisforge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - his-network

  # Redis (for AegisForge/Celery)
  redis:
    image: redis:7-alpine
    container_name: his-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - his-network

  # ============================================================
  # HIS-EMR (Next.js) — Hospital Information System
  # ============================================================

  his-migrate:
    image: ${REGISTRY:-ghcr.io/anup1903}/his-emr:${HIS_TAG:-latest}
    container_name: his-migrate
    entrypoint: ["sh", "-c", "npx prisma db push --skip-generate && npx prisma db seed && echo '=== Migration complete ==='"]
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/his_system?schema=public"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - his-network

  his-app:
    image: ${REGISTRY:-ghcr.io/anup1903}/his-emr:${HIS_TAG:-latest}
    container_name: his-app
    restart: unless-stopped
    ports:
      - "9003:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/his_system?schema=public"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:9003}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      his-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - his-network

  # ============================================================
  # AegisForge — AI Agent Platform
  # ============================================================

  aegisforge-api:
    image: ${REGISTRY:-ghcr.io/anup1903}/aegisforge-api:${AEGIS_TAG:-latest}
    container_name: aegisforge-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AEGIS_DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/aegisforge"
      AEGIS_REDIS_URL: "redis://redis:6379/0"
      AEGIS_ENV: production
      AEGIS_LOG_LEVEL: INFO
      AEGIS_DEMO_MODE: "false"
      TOGETHER_API_KEY: ${TOGETHER_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his-network

  aegisforge-worker:
    image: ${REGISTRY:-ghcr.io/anup1903}/aegisforge-api:${AEGIS_TAG:-latest}
    container_name: aegisforge-worker
    restart: unless-stopped
    command: celery -A aegisforge.executor.worker worker --loglevel=info --concurrency=4
    environment:
      AEGIS_DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD}@postgres:5432/aegisforge"
      AEGIS_REDIS_URL: "redis://redis:6379/0"
      AEGIS_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "celery -A aegisforge.executor.worker inspect ping --timeout=1 -d celery@$$HOSTNAME >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - his-network

  aegisforge-frontend:
    image: ${REGISTRY:-ghcr.io/anup1903}/aegisforge-frontend:${AEGIS_TAG:-latest}
    container_name: aegisforge-frontend
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      aegisforge-api:
        condition: service_started
    networks:
      - his-network

  # ============================================================
  # MedBridge Connect — EMR/EHR Middleware
  # ============================================================

  medbridge:
    image: ${REGISTRY:-ghcr.io/anup1903}/medbridge-connect:${MEDBRIDGE_TAG:-latest}
    container_name: medbridge-connect
    restart: unless-stopped
    ports:
      - "3456:3000"
    volumes:
      - medbridge-data:/app/data
    environment:
      PORT: 3000
      NODE_ENV: production
      AEGISFORGE_URL: http://aegisforge-api:8000
      HIS_URL: http://his-app:3000
      N8N_URL: http://n8n:5678
    depends_on:
      his-app:
        condition: service_healthy
      aegisforge-api:
        condition: service_started
      n8n:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - his-network

  # ============================================================
  # n8n — Workflow Automation
  # ============================================================

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: his-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-0.0.0.0}
      N8N_PORT: 5678
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-admin}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - his-network

  # ============================================================
  # Nginx Reverse Proxy + SSL (Certbot)
  # ============================================================

  nginx:
    image: nginx:1.27-alpine
    container_name: his-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/nginx.conf:/etc/nginx/templates/default.conf.template
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    environment:
      DOMAIN: ${DOMAIN:-his-emr.local}
    depends_on:
      - his-app
      - aegisforge-api
      - aegisforge-frontend
      - medbridge
      - n8n
    networks:
      - his-network

  certbot:
    image: certbot/certbot
    container_name: his-certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - his-network

volumes:
  pgdata:
  redis-data:
  medbridge-data:
  n8n-data:
  certbot-conf:
  certbot-www:

networks:
  his-network:
    driver: bridge
