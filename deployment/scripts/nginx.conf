# ===========================================
# HIS-EMR Platform — Nginx Reverse Proxy
# ===========================================
# Routes subdomains to internal services with SSL

upstream his-app {
    server his-app:3000;
}

upstream aegisforge-api {
    server aegisforge-api:8000;
}

upstream aegisforge-frontend {
    server aegisforge-frontend:80;
}

upstream medbridge {
    server medbridge-connect:3000;
}

upstream n8n {
    server n8n:5678;
}

# --- HIS-EMR ---
server {
    listen 80;
    server_name his-emr.${DOMAIN};

    location / {
        proxy_pass http://his-app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- AegisForge API ---
server {
    listen 80;
    server_name aegisforge-api.${DOMAIN};

    location / {
        proxy_pass http://aegisforge-api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- AegisForge UI ---
server {
    listen 80;
    server_name aegisforge.${DOMAIN};

    location / {
        proxy_pass http://aegisforge-frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- MedBridge Connect ---
server {
    listen 80;
    server_name medbridge.${DOMAIN};

    location / {
        proxy_pass http://medbridge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- n8n ---
server {
    listen 80;
    server_name n8n.${DOMAIN};

    location / {
        proxy_pass http://n8n;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- Default (catch-all) ---
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
